<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Quest — Season 1: The Fraction Forest</title>
<style>
/* ═══════════════════════════════════════════════════════════ */
/* RESET & BASE                                                */
/* ═══════════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600;700&family=MedievalSharp&display=swap');

:root{
  --gold:#FFD700;--dark-gold:#B8860B;--deep-blue:#0a1628;
  --forest-green:#1a472a;--forest-dark:#0d2818;
  --potion-pink:#ff69b4;--potion-rose:#e75480;
  --potion-blue:#4fc3f7;--potion-silver:#c0c0c0;
  --potion-orange:#ff8c00;--potion-red:#ff4444;
  --success:#4caf50;--error:#f44336;--warning:#ff9800;
  --text-primary:#e8dcc8;--text-secondary:#a89880;
  --card-bg:rgba(20,30,50,0.92);--overlay:rgba(0,0,0,0.7);
  --glow-gold:0 0 20px rgba(255,215,0,0.4);
  --glow-green:0 0 20px rgba(76,175,80,0.5);
  --glow-pink:0 0 15px rgba(255,105,180,0.4);
}

html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Open Sans',sans-serif;color:var(--text-primary);
  background:var(--deep-blue);
}

/* ═══════════════════════════════════════════════════════════ */
/* GAME CONTAINER                                              */
/* ═══════════════════════════════════════════════════════════ */
#game{
  width:100%;height:100%;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

.screen{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.8s ease;
  padding:20px;
}
.screen.active{opacity:1;pointer-events:all;}

/* ═══════════════════════════════════════════════════════════ */
/* BACKGROUNDS                                                 */
/* ═══════════════════════════════════════════════════════════ */
.bg-title{
  background:linear-gradient(180deg,#020810 0%,#0a1e3d 40%,#1a472a 100%);
}
.bg-forest{
  background:linear-gradient(180deg,#061220 0%,#0d2818 50%,#1a3a20 100%);
}
.bg-cottage{
  background:linear-gradient(135deg,#1a0e05 0%,#2d1a0a 40%,#1a2a15 100%);
}
.bg-cave{
  background:linear-gradient(180deg,#0a0505 0%,#1a0808 50%,#2a1010 100%);
}
.bg-diagnostic{
  background:linear-gradient(180deg,#0a0a20 0%,#151535 50%,#1a1a40 100%);
}
.bg-victory{
  background:linear-gradient(180deg,#1a1005 0%,#2a1a08 50%,#1a2a15 100%);
}

/* ═══════════════════════════════════════════════════════════ */
/* PARTICLE SYSTEM (CSS only)                                  */
/* ═══════════════════════════════════════════════════════════ */
.particles{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;overflow:hidden;
}
.particle{
  position:absolute;border-radius:50%;
  animation:float-up linear infinite;
  opacity:0.6;
}
@keyframes float-up{
  0%{transform:translateY(100vh) scale(0);opacity:0;}
  10%{opacity:0.6;}
  90%{opacity:0.3;}
  100%{transform:translateY(-20px) scale(1);opacity:0;}
}
.sparkle{
  position:absolute;width:4px;height:4px;background:var(--gold);
  border-radius:50%;animation:sparkle-anim 1.5s ease-out forwards;
}
@keyframes sparkle-anim{
  0%{transform:scale(0) translate(0,0);opacity:1;}
  50%{opacity:0.8;}
  100%{transform:scale(1) translate(var(--tx),var(--ty));opacity:0;}
}

/* ═══════════════════════════════════════════════════════════ */
/* TYPOGRAPHY                                                  */
/* ═══════════════════════════════════════════════════════════ */
.title-main{
  font-family:'Cinzel',serif;font-size:clamp(2rem,6vw,4rem);
  color:var(--gold);text-shadow:var(--glow-gold);
  letter-spacing:4px;text-align:center;
  animation:title-glow 3s ease-in-out infinite alternate;
}
@keyframes title-glow{
  from{text-shadow:0 0 10px rgba(255,215,0,0.3);}
  to{text-shadow:0 0 30px rgba(255,215,0,0.6),0 0 60px rgba(255,215,0,0.2);}
}
.title-sub{
  font-family:'MedievalSharp',cursive;font-size:clamp(1rem,3vw,1.6rem);
  color:var(--text-secondary);margin-top:10px;letter-spacing:2px;
}
.level-title{
  font-family:'Cinzel',serif;font-size:clamp(1.2rem,4vw,2rem);
  color:var(--gold);text-align:center;margin-bottom:5px;
}
.level-subtitle{
  font-size:clamp(0.8rem,2vw,1rem);color:var(--text-secondary);
  text-align:center;font-style:italic;margin-bottom:15px;
}

/* ═══════════════════════════════════════════════════════════ */
/* DIALOGUE & CARDS                                            */
/* ═══════════════════════════════════════════════════════════ */
.dialogue-box{
  background:var(--card-bg);border:1px solid rgba(255,215,0,0.3);
  border-radius:12px;padding:clamp(15px,3vw,25px);max-width:700px;
  width:90%;margin:10px auto;backdrop-filter:blur(10px);
  box-shadow:0 4px 30px rgba(0,0,0,0.5);
}
.speaker-name{
  font-family:'Cinzel',serif;color:var(--gold);font-size:0.9rem;
  margin-bottom:8px;letter-spacing:1px;
}
.dialogue-text{
  font-size:clamp(0.9rem,2.5vw,1.1rem);line-height:1.7;
  color:var(--text-primary);
}
.dialogue-text .highlight{color:var(--gold);font-weight:700;}
.dialogue-text .math{
  color:#7ecfff;font-weight:700;font-size:1.15em;
}

/* ═══════════════════════════════════════════════════════════ */
/* FRACTION VISUALIZER                                         */
/* ═══════════════════════════════════════════════════════════ */
.vial-container{
  display:flex;gap:clamp(15px,4vw,40px);justify-content:center;
  align-items:flex-end;margin:15px 0;flex-wrap:wrap;
}
.vial{
  display:flex;flex-direction:column;align-items:center;
}
.vial-label{
  font-size:0.75rem;color:var(--text-secondary);margin-bottom:5px;
  text-align:center;max-width:100px;
}
.vial-body{
  width:clamp(40px,10vw,60px);border:2px solid rgba(255,255,255,0.3);
  border-radius:0 0 12px 12px;position:relative;overflow:hidden;
  background:rgba(0,0,0,0.3);
}
.vial-section{
  width:100%;height:clamp(18px,4vw,25px);border-top:1px solid rgba(255,255,255,0.15);
  transition:background 0.5s ease;
}
.vial-section.filled{animation:fill-pulse 2s ease-in-out infinite alternate;}
@keyframes fill-pulse{
  from{filter:brightness(1);}to{filter:brightness(1.2);}
}
.vial-fraction{
  font-family:'Cinzel',serif;font-size:clamp(1rem,3vw,1.4rem);
  color:var(--gold);margin-top:8px;text-shadow:var(--glow-gold);
}
.vial-name{
  font-size:0.65rem;color:var(--text-secondary);margin-top:3px;
  text-align:center;max-width:80px;
}

/* ═══════════════════════════════════════════════════════════ */
/* CAULDRON                                                    */
/* ═══════════════════════════════════════════════════════════ */
.cauldron{
  width:clamp(100px,25vw,160px);height:clamp(80px,20vw,120px);
  background:radial-gradient(ellipse at 50% 40%,#3a2510,#1a0e05);
  border-radius:0 0 50% 50%;border:3px solid #5a3a1a;
  position:relative;margin:15px auto;
  box-shadow:0 5px 25px rgba(0,0,0,0.6),inset 0 -10px 20px rgba(0,0,0,0.4);
}
.cauldron::before{
  content:'';position:absolute;top:-8px;left:-10px;right:-10px;
  height:16px;background:#5a3a1a;border-radius:8px;
}
.cauldron-liquid{
  position:absolute;bottom:5px;left:5px;right:5px;
  border-radius:0 0 50% 50%;transition:height 1s ease,background 1s ease;
  animation:bubble 3s ease-in-out infinite;
}
@keyframes bubble{
  0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.02);}
}
.cauldron-steam{
  position:absolute;top:-25px;left:50%;transform:translateX(-50%);
  font-size:1.5rem;opacity:0.4;animation:steam 2s ease-in-out infinite;
}
@keyframes steam{
  0%,100%{transform:translateX(-50%) translateY(0);opacity:0.2;}
  50%{transform:translateX(-50%) translateY(-10px);opacity:0.5;}
}

/* ═══════════════════════════════════════════════════════════ */
/* QUESTION BOX                                                */
/* ═══════════════════════════════════════════════════════════ */
.question-box{
  background:var(--card-bg);border:2px solid rgba(255,215,0,0.3);
  border-radius:16px;padding:clamp(15px,3vw,25px);
  max-width:600px;width:90%;margin:10px auto;
  box-shadow:var(--glow-gold);
}
.question-text{
  font-size:clamp(1rem,3vw,1.3rem);text-align:center;
  margin-bottom:15px;color:var(--text-primary);line-height:1.5;
}
.question-math{
  font-size:clamp(1.4rem,5vw,2.2rem);text-align:center;
  color:var(--gold);font-family:'Cinzel',serif;
  margin:15px 0;text-shadow:var(--glow-gold);
}

.answers-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-top:15px;
}
.answer-btn{
  background:rgba(30,50,80,0.8);border:2px solid rgba(100,150,200,0.3);
  border-radius:10px;padding:clamp(10px,2vw,15px);
  color:var(--text-primary);font-size:clamp(0.9rem,2.5vw,1.1rem);
  cursor:pointer;transition:all 0.3s ease;text-align:center;
  font-family:'Open Sans',sans-serif;
}
.answer-btn:hover{
  background:rgba(40,70,120,0.9);border-color:var(--gold);
  transform:translateY(-2px);box-shadow:var(--glow-gold);
}
.answer-btn.correct{
  background:rgba(76,175,80,0.3)!important;
  border-color:var(--success)!important;
  box-shadow:var(--glow-green)!important;
  animation:correct-pulse 0.5s ease;
}
.answer-btn.wrong{
  background:rgba(244,67,54,0.2)!important;
  border-color:var(--error)!important;
  animation:wrong-shake 0.5s ease;
}
@keyframes correct-pulse{
  0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);}
}
@keyframes wrong-shake{
  0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}
  75%{transform:translateX(8px);}
}

/* ═══════════════════════════════════════════════════════════ */
/* BUTTONS                                                     */
/* ═══════════════════════════════════════════════════════════ */
.btn{
  background:linear-gradient(135deg,rgba(255,215,0,0.2),rgba(184,134,11,0.3));
  border:2px solid var(--gold);border-radius:10px;
  padding:clamp(10px,2vw,14px) clamp(25px,5vw,40px);
  color:var(--gold);font-family:'Cinzel',serif;
  font-size:clamp(0.9rem,2.5vw,1.1rem);cursor:pointer;
  transition:all 0.3s ease;letter-spacing:1px;
  text-transform:uppercase;
}
.btn:hover{
  background:linear-gradient(135deg,rgba(255,215,0,0.4),rgba(184,134,11,0.5));
  transform:translateY(-2px);box-shadow:var(--glow-gold);
}
.btn-small{
  padding:8px 20px;font-size:0.85rem;
}
.btn-success{border-color:var(--success);color:var(--success);}
.btn-secondary{
  border-color:var(--text-secondary);color:var(--text-secondary);
  font-family:'Open Sans',sans-serif;text-transform:none;font-size:0.85rem;
}
.btn-group{
  display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:15px;
}

/* ═══════════════════════════════════════════════════════════ */
/* HUD (Heads-Up Display)                                      */
/* ═══════════════════════════════════════════════════════════ */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(10,22,40,0.95);border-bottom:1px solid rgba(255,215,0,0.2);
  padding:8px 15px;display:none;
  font-size:clamp(0.7rem,2vw,0.85rem);
}
#hud.visible{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;}
.hud-item{display:flex;align-items:center;gap:5px;color:var(--text-secondary);}
.hud-value{color:var(--gold);font-weight:700;}
.hud-timer{color:var(--warning);font-family:monospace;font-size:1rem;}

/* ═══════════════════════════════════════════════════════════ */
/* PROGRESS BAR                                                */
/* ═══════════════════════════════════════════════════════════ */
.progress-container{
  width:90%;max-width:400px;height:12px;
  background:rgba(255,255,255,0.1);border-radius:6px;
  margin:10px auto;overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:6px;transition:width 1s ease;
  background:linear-gradient(90deg,var(--dark-gold),var(--gold));
}

/* ═══════════════════════════════════════════════════════════ */
/* FEEDBACK OVERLAY                                            */
/* ═══════════════════════════════════════════════════════════ */
.feedback{
  background:var(--card-bg);border-radius:16px;
  padding:clamp(15px,3vw,25px);max-width:550px;width:90%;
  margin:10px auto;border:2px solid;
  animation:feedback-in 0.5s ease;
}
.feedback.correct-feedback{border-color:var(--success);}
.feedback.wrong-feedback{border-color:var(--error);}
@keyframes feedback-in{
  from{transform:scale(0.9);opacity:0;}to{transform:scale(1);opacity:1;}
}
.feedback-icon{font-size:2.5rem;text-align:center;margin-bottom:10px;}
.feedback-title{
  font-family:'Cinzel',serif;font-size:1.2rem;text-align:center;
  margin-bottom:10px;
}
.feedback-text{
  font-size:0.95rem;line-height:1.7;color:var(--text-primary);
}
.feedback-math{
  background:rgba(0,0,0,0.3);border-radius:8px;
  padding:10px 15px;margin:10px 0;font-size:1.1rem;
  text-align:center;color:#7ecfff;font-weight:700;
}
.xp-gain{
  color:var(--gold);font-weight:700;font-size:1.1rem;
  text-align:center;margin-top:10px;
  animation:xp-pop 0.5s ease;
}
@keyframes xp-pop{
  0%{transform:scale(0.5);opacity:0;}
  70%{transform:scale(1.2);}
  100%{transform:scale(1);opacity:1;}
}

/* ═══════════════════════════════════════════════════════════ */
/* CONCEPT CARD (HINT)                                         */
/* ═══════════════════════════════════════════════════════════ */
.concept-card{
  background:rgba(15,25,50,0.95);border:2px solid rgba(126,207,255,0.4);
  border-radius:16px;padding:20px;max-width:500px;width:90%;
  margin:10px auto;
  box-shadow:0 0 20px rgba(126,207,255,0.15);
}
.concept-card h3{
  color:#7ecfff;font-family:'Cinzel',serif;font-size:1rem;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.concept-rule{
  background:rgba(0,0,0,0.4);border-radius:8px;
  padding:12px;margin:10px 0;text-align:center;
  font-size:1.2rem;color:var(--gold);
}

/* ═══════════════════════════════════════════════════════════ */
/* DRAGON / BOSS                                               */
/* ═══════════════════════════════════════════════════════════ */
.dragon-art{
  font-size:clamp(4rem,15vw,8rem);text-align:center;
  filter:drop-shadow(0 0 20px rgba(255,100,0,0.5));
  animation:dragon-breathe 3s ease-in-out infinite;
}
@keyframes dragon-breathe{
  0%,100%{transform:scale(1);}50%{transform:scale(1.05);}
}
.dragon-hp{
  width:80%;max-width:400px;height:20px;
  background:rgba(255,255,255,0.1);border-radius:10px;
  margin:10px auto;overflow:hidden;border:1px solid rgba(255,100,0,0.4);
}
.dragon-hp-fill{
  height:100%;border-radius:10px;transition:width 0.8s ease;
  background:linear-gradient(90deg,#ff4444,#ff8c00);
}
.player-hp{
  width:80%;max-width:400px;height:16px;
  background:rgba(255,255,255,0.1);border-radius:8px;
  margin:8px auto;overflow:hidden;border:1px solid rgba(76,175,80,0.4);
}
.player-hp-fill{
  height:100%;border-radius:8px;transition:width 0.8s ease;
  background:linear-gradient(90deg,var(--success),#81c784);
}

/* ═══════════════════════════════════════════════════════════ */
/* DIAGNOSTIC                                                  */
/* ═══════════════════════════════════════════════════════════ */
.diagnostic-progress{
  font-size:0.85rem;color:var(--text-secondary);text-align:center;
  margin-bottom:10px;
}
.result-bar{
  display:flex;align-items:center;gap:10px;margin:8px 0;
}
.result-label{width:130px;font-size:0.85rem;text-align:right;}
.result-track{
  flex:1;height:20px;background:rgba(255,255,255,0.1);
  border-radius:10px;overflow:hidden;
}
.result-fill{
  height:100%;border-radius:10px;transition:width 1.5s ease;
}
.result-value{width:45px;font-size:0.85rem;font-weight:700;}

/* ═══════════════════════════════════════════════════════════ */
/* RESPONSIVE                                                  */
/* ═══════════════════════════════════════════════════════════ */
@media(max-width:500px){
  .answers-grid{grid-template-columns:1fr;}
  .vial-container{gap:15px;}
}

/* ═══════════════════════════════════════════════════════════ */
/* SCROLLABLE CONTENT                                          */
/* ═══════════════════════════════════════════════════════════ */
.scroll-content{
  overflow-y:auto;max-height:calc(100vh - 60px);
  width:100%;padding:10px 0 30px 0;
  display:flex;flex-direction:column;align-items:center;
}
.screen.active .scroll-content{pointer-events:all;}

/* ═══════════════════════════════════════════════════════════ */
/* MISC                                                        */
/* ═══════════════════════════════════════════════════════════ */
.emoji-icon{font-size:1.5rem;margin-right:5px;}
.badge-display{
  display:inline-block;background:rgba(255,215,0,0.15);
  border:1px solid var(--gold);border-radius:20px;
  padding:4px 14px;font-size:0.8rem;color:var(--gold);
  margin:3px;
}
.fade-in{animation:fadeIn 0.8s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.celebration{animation:celebrate 1s ease;}
@keyframes celebrate{0%{transform:scale(0.8);opacity:0;}60%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
.text-center{text-align:center;}
.mt-10{margin-top:10px;}.mt-20{margin-top:20px;}
.mb-10{margin-bottom:10px;}.mb-20{margin-bottom:20px;}
hr.pointed{border:none;border-top:1px solid rgba(255,215,0,0.15);margin:15px 0;width:80%;}
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="hud-item">⭐ XP: <span class="hud-value" id="hud-xp">0</span></div>
  <div class="hud-item">📍 <span id="hud-location">Fraction Forest</span></div>
  <div class="hud-item" id="hud-timer-box" style="display:none">⏱️ <span class="hud-timer" id="hud-timer">90</span>s</div>
  <div class="hud-item">🏷️ <span class="hud-value" id="hud-badges">0</span> badges</div>
</div>

<!-- GAME CONTAINER -->
<div id="game"></div>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- JAVASCRIPT ENGINE                                       -->
<!-- ═══════════════════════════════════════════════════════ -->
<script>
// ═══════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════
const G = {
  xp: 0,
  badges: [],
  level: 0,
  currentScreen: null,
  timerInterval: null,
  timerValue: 0,
  bossHP: 5,
  playerHP: 3,
  bossQ: 0,
  diagnosticAnswers: [],
  diagnosticQ: 0,
  hintsUsed: 0,
  correctStreak: 0,
  totalCorrect: 0,
  totalAttempted: 0,
  levelsComplete: [false,false,false,false,false],
  bossDefeated: false,
  startTime: Date.now()
};

const $ = id => document.getElementById(id);
const game = $('game');

// ═══════════════════════════════════════════════════════════
// AUDIO ENGINE (Simple Web Audio Tones)
// ═══════════════════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx();}

function playTone(freq,duration=0.2,type='sine',vol=0.15){
  try{
    initAudio();
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type=type;osc.frequency.value=freq;
    gain.gain.setValueAtTime(vol,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+duration);
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.start();osc.stop(audioCtx.currentTime+duration);
  }catch(e){}
}

function sfx(name){
  switch(name){
    case'correct':playTone(523,0.1);setTimeout(()=>playTone(659,0.1),100);setTimeout(()=>playTone(784,0.2),200);break;
    case'wrong':playTone(200,0.3,'square',0.1);break;
    case'click':playTone(440,0.05);break;
    case'reveal':playTone(330,0.15);setTimeout(()=>playTone(440,0.15),150);break;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el = $(id);
  if(el){el.classList.add('active');G.currentScreen=id;}
  updateHUD();
}

function updateHUD(){
  $('hud-xp').textContent=G.xp;
  $('hud-badges').textContent=G.badges.length;
}

function addXP(amount){
  G.xp+=amount;
  updateHUD();
}

function addBadge(name){
  if(!G.badges.includes(name)){G.badges.push(name);updateHUD();}
}

function showHUD(show=true){
  $('hud').classList.toggle('visible',show);
}

// Timer
function startTimer(seconds,onTimeout){
  G.timerValue=seconds;
  $('hud-timer-box').style.display='flex';
  $('hud-timer').textContent=seconds;
  clearInterval(G.timerInterval);
  G.timerInterval=setInterval(()=>{
    G.timerValue--;
    $('hud-timer').textContent=G.timerValue;
    if(G.timerValue<=10)$('hud-timer').style.color='#f44336';
    else if(G.timerValue<=30)$('hud-timer').style.color='#ff9800';
    else $('hud-timer').style.color='#ff9800';
    if(G.timerValue<=0){clearInterval(G.timerInterval);if(onTimeout)onTimeout();}
  },1000);
}
function stopTimer(){
  clearInterval(G.timerInterval);
  $('hud-timer-box').style.display='none';
}

// Sparkle effect
function createSparkles(container,count=30){
  for(let i=0;i<count;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    s.style.setProperty('--tx',(Math.random()-0.5)*200+'px');
    s.style.setProperty('--ty',(Math.random()-0.5)*200+'px');
    s.style.animationDelay=Math.random()*0.5+'s';
    s.style.background=['#FFD700','#fff','#81c784','#7ecfff'][Math.floor(Math.random()*4)];
    container.appendChild(s);
    setTimeout(()=>s.remove(),2000);
  }
}

// ═══════════════════════════════════════════════════════════
// VIAL BUILDER
// ═══════════════════════════════════════════════════════════
function buildVial(numerator,denominator,color,label,name){
  let html=`<div class="vial">`;
  if(label)html+=`<div class="vial-label">${label}</div>`;
  html+=`<div class="vial-body">`;
  for(let i=denominator;i>=1;i--){
    const filled=i<=numerator;
    html+=`<div class="vial-section${filled?' filled':''}" style="${filled?'background:'+color:''}"></div>`;
  }
  html+=`</div><div class="vial-fraction">${numerator}/${denominator}</div>`;
  if(name)html+=`<div class="vial-name">${name}</div>`;
  html+=`</div>`;
  return html;
}

function buildCauldron(fillPercent,color){
  return `<div class="cauldron">
    <div class="cauldron-steam">♨️</div>
    <div class="cauldron-liquid" style="height:${fillPercent}%;background:${color}"></div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// QUESTION ENGINE
// ═══════════════════════════════════════════════════════════
function buildQuestion(data){
  // data: {question, math, answers:[], correct:index, hint, feedback_correct, feedback_wrong, xp, timer}
  let html=`<div class="question-box fade-in">`;
  html+=`<div class="question-text">${data.question}</div>`;
  if(data.math) html+=`<div class="question-math">${data.math}</div>`;
  html+=`<div class="answers-grid" id="answers-${data.id}">`;
  data.answers.forEach((a,i)=>{
    html+=`<button class="answer-btn" data-idx="${i}" onclick="handleAnswer('${data.id}',${i})">${a}</button>`;
  });
  html+=`</div>`;
  if(data.hint){
    html+=`<div class="btn-group mt-10">
      <button class="btn-secondary btn-small" onclick="showHint('${data.id}')">💡 Hint</button>
    </div>`;
    html+=`<div id="hint-${data.id}" style="display:none" class="concept-card mt-10">
      <h3>💡 Thorne's Wisdom</h3>
      <div class="dialogue-text">${data.hint}</div>
      <button class="btn-small btn-secondary mt-10" onclick="this.parentElement.style.display='none'">Dismiss</button>
    </div>`;
  }
  html+=`</div>`;
  html+=`<div id="feedback-${data.id}" style="display:none"></div>`;
  return html;
}

// Store question data globally for answer handling
const questionData={};

function registerQuestion(data){
  questionData[data.id]=data;
}

function showHint(id){
  const h=$('hint-'+id);
  if(h){h.style.display=h.style.display==='none'?'block':'none';G.hintsUsed++;}
}

function handleAnswer(qId,chosen){
  const data=questionData[qId];
  if(!data||data.answered)return;
  data.answered=true;
  
  const btns=document.querySelectorAll(`#answers-${qId} .answer-btn`);
  btns.forEach(b=>b.style.pointerEvents='none');
  
  G.totalAttempted++;
  
  const isCorrect = Array.isArray(data.correct)?data.correct.includes(chosen):chosen===data.correct;
  
  if(isCorrect){
    sfx('correct');
    btns[chosen].classList.add('correct');
    G.totalCorrect++;
    G.correctStreak++;
    addXP(data.xp||15);
    
    const container=btns[chosen].closest('.screen')||document.body;
    createSparkles(container);
    
    const fb=$('feedback-'+qId);
    fb.style.display='block';
    fb.innerHTML=`<div class="feedback correct-feedback fade-in">
      <div class="feedback-icon">🎉</div>
      <div class="feedback-title" style="color:var(--success)">Brilliant!</div>
      <div class="feedback-text">${data.feedback_correct}</div>
      ${data.xp?`<div class="xp-gain">+${data.xp} XP ⭐</div>`:''}
      <div class="btn-group mt-10">
        <button class="btn" onclick="sfx('click');${data.onCorrect||''}">Continue →</button>
      </div>
    </div>`;
  } else {
    sfx('wrong');
    btns[chosen].classList.add('wrong');
    G.correctStreak=0;
    
    // Show correct answer
    const correctIdx=Array.isArray(data.correct)?data.correct[0]:data.correct;
    setTimeout(()=>btns[correctIdx].classList.add('correct'),500);
    
    const fb=$('feedback-'+qId);
    fb.style.display='block';
    fb.innerHTML=`<div class="feedback wrong-feedback fade-in">
      <div class="feedback-icon">💭</div>
      <div class="feedback-title" style="color:var(--warning)">Not quite...</div>
      <div class="feedback-text">${data.feedback_wrong}</div>
      <div class="btn-group mt-10">
        <button class="btn" onclick="sfx('click');${data.onWrong||data.onCorrect||''}">Continue →</button>
      </div>
    </div>`;
  }
  stopTimer();
}

function generateParticles(containerId,count){
  const c = $(containerId);
  if(!c)return;
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.width=p.style.height=(Math.random()*4+2)+'px';
    p.style.background=['var(--gold)','var(--potion-blue)','var(--potion-pink)','#fff'][Math.floor(Math.random()*4)];
    p.style.animationDuration=(Math.random()*10+8)+'s';
    p.style.animationDelay=(Math.random()*10)+'s';
    c.appendChild(p);
  }
}

// ═══════════════════════════════════════════════════════════
// BOSS BATTLE LOGIC
// ═══════════════════════════════════════════════════════════
function startBoss(){
  addBadge('Royal Tax Collector');
  $('hud-location').textContent='⚔️ BOSS BATTLE';
  showScreen('boss-intro');
}

function startBossQ(index){
  G.bossQ=index;
  // Reset question answered state
  const qd=questionData['boss-q'+index];
  if(qd)qd.answered=false;
  showScreen('boss-q'+index);
  startTimer(60,()=>bossResult(index,false));
  // Update HP bars
  for(let i=0;i<5;i++){
    const dhp=$('dragon-hp-'+i);
    const php=$('player-hp-'+i);
    if(dhp)dhp.style.width=Math.max(0,(G.bossHP/5)*100)+'%';
    if(php)php.style.width=Math.max(0,(G.playerHP/3)*100)+'%';
  }
}

function bossResult(index,correct){
  stopTimer();
  if(correct){
    G.bossHP--;
  } else {
    G.playerHP--;
  }
  
  if(G.playerHP<=0){
    setTimeout(()=>{sfx('wrong');showScreen('boss-defeat');},1500);
    return;
  }
  
  if(index>=4 || G.bossHP<=0){
    // Boss defeated
    setTimeout(()=>{
      sfx('victory');
      G.bossDefeated=true;
      addBadge('Dragon Slayer');
      addBadge('Season 1 Champion');
      
      // Build final stats
      const elapsed=Math.round((Date.now()-G.startTime)/60000);
      $('final-stats').innerHTML=`
        <strong>Your Journey Stats:</strong><br>
        ⭐ Total XP: ${G.xp}<br>
        🏷️ Badges: ${G.badges.length}<br>
        🎯 Accuracy: ${G.totalAttempted?Math.round(G.totalCorrect/G.totalAttempted*100):0}%<br>
        ⏱️ Time: ${elapsed} minutes<br>
        💡 Hints Used: ${G.hintsUsed}
      `;
      $('badges-display').innerHTML=G.badges.map(b=>`<span class="badge-display">🏷️ ${b}</span>`).join('');
      showScreen('boss-victory');
    },1500);
    return;
  }
  
  // Next question after delay
  setTimeout(()=>startBossQ(index+1),2000);
}

// ═══════════════════════════════════════════════════════════
function startDiagnostic(){
  showHUD(false);
  showScreen('diagnostic-intro');
}

function showDiagQ(index){
  if(index>=25){showDiagResults();return;}
  // Reset question state
  const qd=questionData['dq'+index];
  if(qd)qd.answered=false;
  showScreen('diag-q'+index);
}

function diagNext(index,correct){
  G.diagnosticAnswers[index]=correct;
  setTimeout(()=>showDiagQ(index+1),1200);
}

function showDiagResults(){
  const sections={
    Fractions:{correct:0,total:5,color:'#ff69b4',season:'Season 1: Fraction Forest'},
    Algebra:{correct:0,total:5,color:'#7ecfff',season:'Season 2: Algebra Arena + Season 5-6'},
    Numbers:{correct:0,total:5,color:'#81c784',season:'Season 3: Kingdom of Numbers'},
    Exponents:{correct:0,total:3,color:'#ffb74d',season:'Season 4: Tower of Exponents'},
    Geometry:{correct:0,total:3,color:'#ce93d8',season:'Season 10: Geometry Galaxy'},
    Advanced:{correct:0,total:4,color:'#4fc3f7',season:'Seasons 6-9: Word Problems, Stats, Probability'}
  };
  
  const sectionMap=['Fractions','Fractions','Fractions','Fractions','Fractions',
    'Algebra','Algebra','Algebra','Algebra','Algebra',
    'Numbers','Numbers','Numbers','Numbers','Numbers',
    'Exponents','Exponents','Exponents',
    'Geometry','Geometry','Geometry',
    'Advanced','Advanced','Advanced','Advanced'];
  
  G.diagnosticAnswers.forEach((correct,i)=>{
    const sec=sectionMap[i];
    if(correct)sections[sec].correct++;
  });
  
  let totalCorrect=0,totalQ=25;
  Object.values(sections).forEach(s=>totalCorrect+=s.correct);
  const overall=Math.round(totalCorrect/totalQ*100);
  
  let html=`
    <div class="text-center mb-20">
      <div style="font-size:2rem;color:var(--gold);font-family:'Cinzel',serif;">${overall}% Ready</div>
      <div class="progress-container mt-10">
        <div class="progress-fill" style="width:${overall}%;background:${overall>=80?'var(--success)':overall>=60?'var(--warning)':'var(--error)'}"></div>
      </div>
    </div>
    <hr class="pointed">
    <h3 style="color:var(--gold);font-family:'Cinzel',serif;font-size:1rem;margin-bottom:15px;">Breakdown by Topic</h3>
  `;
  
  const weakAreas=[];
  const strongAreas=[];
  
  Object.entries(sections).forEach(([name,data])=>{
    const pct=Math.round(data.correct/data.total*100);
    let status,statusColor;
    if(pct>=80){status='✅ Strong';statusColor='var(--success)';strongAreas.push(name);}
    else if(pct>=60){status='🟡 Review';statusColor='var(--warning)';weakAreas.push(name);}
    else{status='🔴 Study!';statusColor='var(--error)';weakAreas.push(name);}
    
    html+=`
    <div class="result-bar">
      <div class="result-label">${name}</div>
      <div class="result-track">
        <div class="result-fill" style="width:${pct}%;background:${data.color}"></div>
      </div>
      <div class="result-value" style="color:${statusColor}">${pct}%</div>
    </div>
    <div style="font-size:0.7rem;color:var(--text-secondary);text-align:right;margin-bottom:8px;">
      → ${data.season}
    </div>`;
  });
  
  html+=`<hr class="pointed">`;
  
  // Study Plan
  html+=`<h3 style="color:var(--gold);font-family:'Cinzel',serif;font-size:1rem;margin:15px 0;">Your Personalized Study Plan</h3>`;
  
  if(weakAreas.length===0){
    html+=`<div class="feedback-text">🎉 <strong>Impressive!</strong> You're strong across the board. 
    Focus on speed training and full-length practice tests.</div>`;
  } else {
    html+=`<div class="feedback-text">`;
    weakAreas.forEach((area,i)=>{
      const sec=sections[area];
      html+=`<strong>${i===0?'🥇 Priority':'📌'} ${i+1}:</strong> ${area} — ${sec.season}<br>`;
    });
    html+=`<br>Start with your #1 priority. Play that Season's levels first, 
    then review flashcards daily for 15 minutes.</div>`;
  }
  
  if(strongAreas.length>0){
    html+=`<div style="margin-top:10px;font-size:0.85rem;color:var(--success);">
    <strong>Strengths to maintain:</strong> ${strongAreas.join(', ')} — quick weekly review is enough.</div>`;
  }
  
  $('diag-results-content').innerHTML=html;
  showScreen('diagnostic-results');
}
